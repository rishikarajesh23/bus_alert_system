<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/styles.css">
    <title>Provide Feedback</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body class="has-background"> <div class="container">
        <h2 class="title">Provide Your Feedback</h2>
        <div class="feedback-card">
            <form action="/submit_feedback" method="POST">
                <div class="input-group">
                    <label for="name"><i class="fas fa-user"></i> Your Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your name">
                </div>
                <div class="input-group">
                    <label for="email"><i class="fas fa-envelope"></i> Your Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="rating"><i class="fas fa-star"></i> Rating (1-5):</label>
                    <select id="rating" name="rating" required>
                        <option value="1">1 - Poor</option>
                        <option value="2">2 - Fair</option>
                        <option value="3">3 - Good</option>
                        <option value="4">4 - Very Good</option>
                        <option value="5">5 - Excellent</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="comments"><i class="fas fa-comment"></i> Your Feedback:</label>
                    <textarea id="comments" name="comments" rows="4" required placeholder="Write your comments here..."></textarea>
                </div>
                <button type="submit" class="submit-button"><i class="fas fa-paper-plane"></i> Submit Feedback</button>
            </form>
            <a href="/home" class="back-button"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>
</body>
</html>
